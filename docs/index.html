<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenity Platform Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #80EEDB;
            --secondary: #7832E0;
            --violet-100: #E0D1FC;
            --violet-200: #D6C5E2;
            --violet-300: #977F97;
            --violet-400: #9B6EF0;
            --violet-500: #7832E0;
            --violet-600: #9A6CF0;
            --violet-700: #2E1C59;
            --violet-800: #1A0E30;
            --violet-900: #2F2D43;
            --green: #34D399;
            --yellow: #FBBF24;
            --red: #F87171;
            --orange: #FB923C;
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-page: #020221;
            --bg-surface: rgba(46, 28, 89, 0.35);
            --bg-surface-hover: rgba(46, 28, 89, 0.55);
            --bg-card: rgba(26, 14, 48, 0.6);
            --bg-card-hover: rgba(26, 14, 48, 0.8);
            --bg-input: rgba(47, 45, 67, 0.5);
            --border: rgba(155, 110, 240, 0.15);
            --border-hover: rgba(155, 110, 240, 0.3);
            --text-primary: #FDFBFF;
            --text-secondary: #CBC4D0;
            --text-muted: #977F97;
            --glow-primary: rgba(128, 238, 219, 0.12);
            --glow-secondary: rgba(120, 50, 224, 0.15);
            --gradient-hero: linear-gradient(135deg, rgba(46,28,89,0.5) 0%, rgba(2,2,33,0.95) 100%);
            --shadow-card: 0 4px 24px rgba(0,0,0,0.3), 0 0 0 1px var(--border);
            --shadow-card-hover: 0 8px 40px rgba(120,50,224,0.15), 0 0 0 1px var(--border-hover);
        }

        [data-theme="light"] {
            --bg-page: #F8F6FC;
            --bg-surface: rgba(255, 255, 255, 0.85);
            --bg-surface-hover: rgba(255, 255, 255, 0.95);
            --bg-card: #FFFFFF;
            --bg-card-hover: #FFFFFF;
            --bg-input: #F0EDF5;
            --border: rgba(155, 110, 240, 0.12);
            --border-hover: rgba(155, 110, 240, 0.25);
            --text-primary: #1A0E30;
            --text-secondary: #4A3D5C;
            --text-muted: #8B7EA0;
            --glow-primary: rgba(128, 238, 219, 0.08);
            --glow-secondary: rgba(120, 50, 224, 0.06);
            --gradient-hero: linear-gradient(135deg, rgba(224,209,252,0.3) 0%, rgba(248,246,252,0.95) 100%);
            --shadow-card: 0 2px 12px rgba(26,14,48,0.06), 0 0 0 1px var(--border);
            --shadow-card-hover: 0 4px 20px rgba(120,50,224,0.08), 0 0 0 1px var(--border-hover);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background var(--transition), color var(--transition);
            min-height: 100vh;
        }

        [data-theme="dark"] body {
            background-image: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(120,50,224,0.08) 0%, transparent 60%);
        }

        /* ─── NAV ─── */
        .nav {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px) saturate(1.5);
            -webkit-backdrop-filter: blur(20px) saturate(1.5);
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
        }

        .nav-inner {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 32px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-logo {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-logo svg { width: 16px; height: 16px; }

        .nav-title {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(90deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-tag {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
            background: rgba(128,238,219,0.1);
            padding: 3px 8px;
            border-radius: 6px;
        }

        .nav-actions { display: flex; align-items: center; gap: 8px; }

        .theme-toggle {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }

        .theme-toggle:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
            background: var(--bg-surface-hover);
        }

        /* ─── TABS ─── */
        .tab-bar {
            display: flex;
            gap: 2px;
            background: var(--bg-input);
            border-radius: var(--radius-sm);
            padding: 3px;
        }

        .tab {
            padding: 6px 16px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            font-family: inherit;
        }

        .tab:hover { color: var(--text-secondary); }
        .tab.active {
            background: var(--bg-card);
            color: var(--text-primary);
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }

        /* ─── CONTAINER ─── */
        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 24px 32px 64px;
        }

        /* ─── HERO STATS ─── */
        .hero {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow-card);
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }

        .stat::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
        }

        .stat.accent::before { background: linear-gradient(90deg, var(--secondary), var(--primary)); }
        .stat.green::before { background: var(--green); }
        .stat.yellow::before { background: var(--yellow); }
        .stat.red::before { background: var(--red); }

        .stat-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .stat.accent .stat-value { color: var(--primary); }
        .stat.green .stat-value { color: var(--green); }
        .stat.yellow .stat-value { color: var(--yellow); }
        .stat.red .stat-value { color: var(--red); }

        /* ─── SECTION HEADERS ─── */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 32px 0 16px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title .icon {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .section-title .icon.aidr { background: rgba(128,238,219,0.1); }
        .section-title .icon.aispm { background: rgba(155,110,240,0.1); }

        .module-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            padding: 4px 10px;
            border-radius: 6px;
        }

        .module-label.aidr {
            color: var(--primary);
            background: rgba(128,238,219,0.1);
            border: 1px solid rgba(128,238,219,0.2);
        }

        .module-label.aispm {
            color: var(--violet-400);
            background: rgba(155,110,240,0.1);
            border: 1px solid rgba(155,110,240,0.2);
        }

        /* ─── SECURITY FINDINGS ─── */
        .findings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 8px;
        }

        .finding-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 18px 20px;
            box-shadow: var(--shadow-card);
            transition: all var(--transition);
            cursor: default;
            display: flex;
            gap: 14px;
            align-items: flex-start;
        }

        .finding-card:hover {
            box-shadow: var(--shadow-card-hover);
            transform: translateY(-1px);
        }

        .severity-badge {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 4px 8px;
            border-radius: 6px;
            white-space: nowrap;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .severity-badge.HIGH { background: rgba(248,113,113,0.15); color: var(--red); }
        .severity-badge.MEDIUM { background: rgba(251,191,36,0.15); color: var(--yellow); }
        .severity-badge.LOW { background: rgba(52,211,153,0.15); color: var(--green); }

        .finding-content { flex: 1; min-width: 0; }

        .finding-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.2px;
        }

        .finding-desc {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .finding-sub {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 6px;
        }

        /* ─── PLATFORM GRID ─── */
        .platform-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }

        .platform-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 16px 18px;
            box-shadow: var(--shadow-card);
            transition: all var(--transition);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .platform-card:hover {
            box-shadow: var(--shadow-card-hover);
            transform: translateY(-1px);
        }

        .platform-card.active {
            border: 1px solid var(--primary);
            box-shadow: var(--shadow-card-hover), 0 0 0 1px var(--primary);
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-indicator.changed { background: var(--yellow); box-shadow: 0 0 8px rgba(251,191,36,0.4); }
        .status-indicator.stable { background: var(--green); box-shadow: 0 0 8px rgba(52,211,153,0.3); }
        .status-indicator.error { background: var(--red); box-shadow: 0 0 8px rgba(248,113,113,0.4); }
        .status-indicator.initial { background: var(--primary); box-shadow: 0 0 8px rgba(128,238,219,0.4); }

        .platform-info { flex: 1; min-width: 0; }

        .platform-name {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: -0.2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .platform-status-text {
            font-size: 11px;
            color: var(--text-muted);
        }

        .category-tag {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--bg-input);
            color: var(--text-muted);
        }

        /* ─── REPORT PANEL ─── */
        .report-section {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 16px;
        }

        .report-list-panel {
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-card);
            overflow: hidden;
        }

        .report-list-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
        }

        .report-list-items { max-height: 500px; overflow-y: auto; }

        .report-item {
            padding: 12px 18px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: all var(--transition);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .report-item:last-child { border-bottom: none; }
        .report-item:hover { background: var(--bg-surface-hover); }

        .report-item.active {
            background: var(--bg-surface-hover);
            border-left: 3px solid var(--primary);
        }

        .report-date { font-size: 13px; font-weight: 600; }

        .report-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
        }

        .report-badge.has-changes { background: rgba(251,191,36,0.12); color: var(--yellow); }
        .report-badge.no-changes { background: rgba(52,211,153,0.12); color: var(--green); }
        .report-badge.initial { background: rgba(128,238,219,0.12); color: var(--primary); }

        .report-viewer {
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-card);
            padding: 32px;
            min-height: 400px;
            overflow-x: hidden;
        }

        /* ─── MARKDOWN STYLES ─── */
        .report-viewer h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 16px; background: linear-gradient(90deg, var(--secondary), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .report-viewer h2 { font-size: 16px; font-weight: 700; margin: 28px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); letter-spacing: -0.3px; }
        .report-viewer h3 { font-size: 14px; font-weight: 700; margin: 18px 0 8px; color: var(--violet-400); }
        .report-viewer p { margin: 8px 0; color: var(--text-secondary); font-size: 13px; }
        .report-viewer ul, .report-viewer ol { margin: 8px 0 8px 20px; font-size: 13px; color: var(--text-secondary); }
        .report-viewer li { margin: 4px 0; }
        .report-viewer strong { color: var(--text-primary); font-weight: 600; }
        .report-viewer code { background: var(--bg-input); padding: 2px 6px; border-radius: 4px; font-size: 12px; font-family: 'SF Mono', 'Fira Code', monospace; }
        .report-viewer pre { background: var(--bg-input); padding: 16px; border-radius: var(--radius-sm); overflow-x: auto; margin: 12px 0; }
        .report-viewer a { color: var(--primary); text-decoration: none; font-weight: 500; }
        .report-viewer a:hover { text-decoration: underline; }
        .report-viewer hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
        .report-viewer em { color: var(--text-muted); }
        .report-viewer table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 13px; }
        .report-viewer th, .report-viewer td { padding: 10px 14px; border: 1px solid var(--border); text-align: left; }
        .report-viewer th { background: var(--bg-input); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* ─── EMPTY / LOADING ─── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 300px;
            color: var(--text-muted);
        }

        .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
        .empty-state p { font-size: 13px; }
        .loading { color: var(--text-muted); padding: 24px; text-align: center; font-size: 13px; }

        /* ─── VIEW TOGGLE ─── */
        .view-content { display: none; }
        .view-content.active { display: block; }

        /* ─── HIGHLIGHTS ─── */
        .highlights-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }

        .highlight-item {
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            padding: 14px 18px;
            box-shadow: var(--shadow-card);
            font-size: 13px;
            color: var(--text-secondary);
            border-left: 3px solid var(--secondary);
        }

        .highlight-item strong { color: var(--text-primary); }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 1100px) {
            .hero { grid-template-columns: repeat(3, 1fr); }
            .findings-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 900px) {
            .hero { grid-template-columns: repeat(2, 1fr); }
            .report-section { grid-template-columns: 1fr; }
            .container { padding: 16px; }
            .nav-inner { padding: 0 16px; }
            .nav-tag { display: none; }
        }

        @media (max-width: 600px) {
            .hero { grid-template-columns: 1fr; }
            .platform-grid { grid-template-columns: 1fr 1fr; }
        }

        /* ─── SCROLLBAR ─── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-inner">
        <div class="nav-brand">
            <div class="nav-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="#020221" stroke-width="2.5" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <span class="nav-title">Zenity Platform Monitor</span>
            <span class="nav-tag">Security Intelligence</span>
        </div>
        <div class="nav-actions">
            <div class="tab-bar" id="tab-bar">
                <button class="tab active" data-view="overview">Overview</button>
                <button class="tab" data-view="platforms">Platforms</button>
                <button class="tab" data-view="reports">Reports</button>
            </div>
            <button class="theme-toggle" id="theme-toggle" title="Toggle theme">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            </button>
        </div>
    </div>
</nav>

<div class="container">
    <!-- OVERVIEW VIEW -->
    <div class="view-content active" id="view-overview">
        <div class="hero" id="hero-stats"></div>

        <div class="section-header">
            <div class="section-title">
                <span class="icon aidr">🛡</span>
                AIDR — AI Detection & Response
            </div>
            <span class="module-label aidr">Data Lens &middot; Activity &middot; Findings</span>
        </div>
        <div class="findings-grid" id="aidr-findings"></div>

        <div class="section-header">
            <div class="section-title">
                <span class="icon aispm">📋</span>
                AISPM — AI Security Posture Management
            </div>
            <span class="module-label aispm">Inventory &middot; Violations</span>
        </div>
        <div class="findings-grid" id="aispm-findings"></div>

        <div class="section-header">
            <div class="section-title">Key Highlights</div>
        </div>
        <div class="highlights-list" id="highlights-list"></div>
    </div>

    <!-- PLATFORMS VIEW -->
    <div class="view-content" id="view-platforms">
        <div class="section-header">
            <div class="section-title">All Monitored Platforms</div>
        </div>
        <div class="platform-grid" id="platform-grid"></div>

        <div class="section-header" id="platform-detail-header" style="display:none">
            <div class="section-title" id="platform-detail-title"></div>
        </div>
        <div class="report-viewer" id="platform-detail" style="display:none"></div>
    </div>

    <!-- REPORTS VIEW -->
    <div class="view-content" id="view-reports">
        <div class="section-header">
            <div class="section-title">Report Archive</div>
        </div>
        <div class="report-section">
            <div class="report-list-panel">
                <div class="report-list-header">History</div>
                <div class="report-list-items" id="report-list"></div>
            </div>
            <div class="report-viewer" id="report-viewer">
                <div class="empty-state">
                    <div class="icon">📊</div>
                    <p>Select a report to view</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let reports = [];
let currentView = 'overview';

async function init() {
    try {
        const res = await fetch('report-index.json');
        reports = await res.json();
        reports.sort((a, b) => b.date.localeCompare(a.date));
        renderOverview();
        renderPlatforms();
        renderReportList();
    } catch (e) {
        document.getElementById('hero-stats').innerHTML = '<div class="loading">No reports yet. Run the monitor to generate your first report.</div>';
    }
}

/* ─── OVERVIEW ─── */
function renderOverview() {
    const latest = reports[0];
    if (!latest) return;

    const total = latest.platforms.length;
    const changed = latest.platforms.filter(p => p.status === 'changed').length;
    const errors = latest.platforms.filter(p => p.status === 'error').length;
    const aidrCount = (latest.aidr || []).length;
    const aispmCount = (latest.aispm || []).length;

    document.getElementById('hero-stats').innerHTML = `
        <div class="stat accent">
            <div class="stat-label">Platforms Monitored</div>
            <div class="stat-value">${total}</div>
        </div>
        <div class="stat yellow">
            <div class="stat-label">Changes Detected</div>
            <div class="stat-value">${changed}</div>
        </div>
        <div class="stat green">
            <div class="stat-label">Stable</div>
            <div class="stat-value">${total - changed - errors}</div>
        </div>
        <div class="stat red">
            <div class="stat-label">Security Findings</div>
            <div class="stat-value">${aidrCount + aispmCount}</div>
        </div>
        <div class="stat accent">
            <div class="stat-label">Latest Report</div>
            <div class="stat-value" style="font-size:20px">${latest.date}</div>
        </div>
    `;

    renderFindings('aidr-findings', latest.aidr || [], 'AIDR');
    renderFindings('aispm-findings', latest.aispm || [], 'AISPM');
    renderHighlights(latest.highlights || []);
}

function renderFindings(containerId, items, module) {
    const container = document.getElementById(containerId);
    if (!items.length) {
        container.innerHTML = '<div class="finding-card"><div class="finding-content"><div class="finding-desc">No findings in latest report</div></div></div>';
        return;
    }
    const severityOrder = { HIGH: 0, MEDIUM: 1, LOW: 2 };
    items.sort((a, b) => (severityOrder[a.severity] || 3) - (severityOrder[b.severity] || 3));

    container.innerHTML = items.map(item => {
        // Extract sub-module from description
        let subModule = '';
        if (module === 'AIDR') {
            if (/data lens/i.test(item.description)) subModule = 'Data Lens';
            else if (/activity/i.test(item.description)) subModule = 'Activity';
            else if (/finding/i.test(item.description)) subModule = 'Findings';
        } else {
            if (/inventory/i.test(item.description)) subModule = 'Inventory';
            else if (/violation/i.test(item.description)) subModule = 'Violations';
        }

        return `
        <div class="finding-card">
            <span class="severity-badge ${item.severity}">${item.severity}</span>
            <div class="finding-content">
                <div class="finding-title">${item.title}</div>
                <div class="finding-desc">${item.description}</div>
                ${subModule ? `<div class="finding-sub">${subModule}</div>` : ''}
            </div>
        </div>`;
    }).join('');
}

function renderHighlights(items) {
    const container = document.getElementById('highlights-list');
    if (!items.length) { container.innerHTML = ''; return; }
    container.innerHTML = items.map(h => `<div class="highlight-item">${formatHighlight(h)}</div>`).join('');
}

function formatHighlight(text) {
    return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
}

/* ─── PLATFORMS ─── */
function renderPlatforms() {
    const latest = reports[0];
    if (!latest) return;

    const categories = {};
    const categoryMap = {
        'Microsoft Copilot (M365)': 'Microsoft', 'Microsoft Copilot Studio': 'Microsoft',
        'Azure AI Foundry': 'Microsoft', 'Power Apps': 'Microsoft', 'Power Automate': 'Microsoft',
        'Power Pages': 'Microsoft', 'Salesforce AgentForce': 'Salesforce', 'Salesforce Einstein': 'Salesforce',
        'ChatGPT Enterprise (OpenAI)': 'OpenAI', 'Claude Enterprise (Anthropic)': 'Anthropic',
        'Amazon Q': 'AWS', 'Amazon Bedrock': 'AWS', 'Amazon Bedrock AgentCore': 'AWS',
        'Google Vertex AI': 'Google', 'ServiceNow': 'ServiceNow', 'Cursor': 'Dev Tools',
        'Windsurf': 'Dev Tools', 'Perplexity': 'AI Search', 'Dia Browser': 'Browsers'
    };

    latest.platforms.forEach(p => {
        const cat = categoryMap[p.name] || 'Other';
        if (!categories[cat]) categories[cat] = [];
        categories[cat].push(p);
    });

    const grid = document.getElementById('platform-grid');
    grid.innerHTML = Object.entries(categories).map(([cat, platforms]) =>
        platforms.map(p => {
            const statusText = { changed: 'Changes detected', stable: 'Stable', error: 'Fetch error', initial: 'Initial scan' };
            return `
            <div class="platform-card" data-platform="${p.name}" onclick="showPlatformDetail('${p.name.replace(/'/g, "\\'")}')">
                <span class="status-indicator ${p.status}"></span>
                <div class="platform-info">
                    <div class="platform-name">${p.name}</div>
                    <div class="platform-status-text">${statusText[p.status] || 'Unknown'}</div>
                </div>
                <span class="category-tag">${cat}</span>
            </div>`;
        }).join('')
    ).join('');
}

async function showPlatformDetail(name) {
    document.querySelectorAll('.platform-card').forEach(c => c.classList.remove('active'));
    const card = document.querySelector(`[data-platform="${name}"]`);
    if (card) card.classList.add('active');

    const header = document.getElementById('platform-detail-header');
    const detail = document.getElementById('platform-detail');
    header.style.display = 'flex';
    detail.style.display = 'block';
    document.getElementById('platform-detail-title').textContent = name;
    detail.innerHTML = '<div class="loading">Loading...</div>';

    try {
        const latest = reports[0];
        const res = await fetch(latest.file);
        const md = await res.text();

        // Extract platform section
        const escapedName = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(`### ${escapedName}\\n([\\s\\S]*?)(?=\\n### |\\n## |$)`);
        const match = md.match(regex);

        if (match) {
            detail.innerHTML = marked.parse(`### ${name}\n${match[1]}`);
        } else {
            detail.innerHTML = '<div class="empty-state"><p>No details found for this platform</p></div>';
        }
    } catch (e) {
        detail.innerHTML = '<div class="empty-state"><p>Failed to load report</p></div>';
    }
}

/* ─── REPORTS ─── */
function renderReportList() {
    const container = document.getElementById('report-list');
    container.innerHTML = reports.map((r, i) => {
        const changedCount = r.platforms.filter(p => p.status === 'changed').length;
        const isInitial = r.platforms.some(p => p.status === 'initial');
        let badgeClass, badgeText;
        if (isInitial) { badgeClass = 'initial'; badgeText = 'Initial'; }
        else if (changedCount > 0) { badgeClass = 'has-changes'; badgeText = `${changedCount} changed`; }
        else { badgeClass = 'no-changes'; badgeText = 'Stable'; }

        return `
        <div class="report-item" data-index="${i}" onclick="loadReport(${i})">
            <span class="report-date">${r.date}</span>
            <span class="report-badge ${badgeClass}">${badgeText}</span>
        </div>`;
    }).join('');
}

async function loadReport(index) {
    const report = reports[index];
    document.querySelectorAll('.report-item').forEach(el => el.classList.remove('active'));
    const items = document.querySelectorAll('.report-item');
    if (items[index]) items[index].classList.add('active');

    const viewer = document.getElementById('report-viewer');
    viewer.innerHTML = '<div class="loading">Loading report...</div>';

    try {
        const res = await fetch(report.file);
        const md = await res.text();
        viewer.innerHTML = marked.parse(md);
    } catch (e) {
        viewer.innerHTML = '<div class="empty-state"><p>Failed to load report</p></div>';
    }
}

/* ─── TABS ─── */
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentView = tab.dataset.view;
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.getElementById(`view-${currentView}`).classList.add('active');
    });
});

/* ─── THEME ─── */
const themeToggle = document.getElementById('theme-toggle');
const savedTheme = localStorage.getItem('zenity-theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
updateThemeIcon(savedTheme);

themeToggle.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('zenity-theme', next);
    updateThemeIcon(next);
});

function updateThemeIcon(theme) {
    themeToggle.innerHTML = theme === 'dark'
        ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
        : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
}

init();
</script>
